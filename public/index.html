<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f1216">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='12' fill='%230f1216'/><text x='32' y='46' font-size='38' text-anchor='middle'>%F0%9F%93%88</text></svg>">
  <link rel="apple-touch-icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' fill='%230f1216'/><text x='90' y='126' font-size='104' text-anchor='middle'>%F0%9F%93%88</text></svg>">
  <link rel="stylesheet" href="style.css">
  <title>StockScanner</title>
</head>
<body>
<header>
  <h1>Stock<span>Scanner</span></h1>
  <span id="status-dot" class="status-dot" title="Server-Verbindung"></span>
  <div id="meta" class="meta"></div>
  <div class="spacer"></div>
  <select id="report" title="Report wählen" style="display:none"></select>
  <input id="filter" placeholder="Filter name / ticker…" autocomplete="off">
  <button class="btn" id="settings-btn" title="Einstellungen" aria-label="Einstellungen">⚙</button>
</header>

<main>
  <div id="offline" class="offline-banner">📵 Server nicht erreichbar — Daten nicht verfügbar</div>

  <div id="setup" class="setup-card" hidden>
    <h2>Verbindung einrichten</h2>
    <p>Füge das Zugriffstoken ein, um die Scanner-Ergebnisse vom lokalen Server zu laden.
       Das Token wird nur auf diesem Gerät gespeichert.</p>
    <div class="setup-row">
      <input id="token-input" type="password" placeholder="Zugriffstoken…"
             autocomplete="off" autocorrect="off" spellcheck="false">
      <button class="btn" id="token-save">Speichern</button>
    </div>
    <p class="hint">Zertifikat noch nicht installiert? <a href="setup/">Anleitung öffnen</a></p>
  </div>

  <div id="status-line" class="status-line"></div>
  <div id="view-error" class="view-error" style="display:none"></div>

  <table id="tbl" style="display:none"><thead></thead><tbody></tbody></table>

  <section id="detail">
    <h2 id="d-name"></h2>
    <div class="sub" id="d-sub"></div>
    <div class="ranges" id="ranges"></div>

    <div class="legend" id="lg-price"></div>
    <div class="chartwrap"><canvas id="c-price" height="340"></canvas></div>

    <div class="legend" id="lg-rec"></div>
    <div class="chartwrap"><canvas id="c-rec" height="140"></canvas></div>

    <div class="legend"><i style="border-color:#4ea1ff"></i>RSI &nbsp;<span class="hint">(30 / 70 bands)</span></div>
    <div class="chartwrap"><canvas id="c-rsi" height="140"></canvas></div>
  </section>
</main>

<div id="tip"></div>

<script type="module" src="src/main.js"></script>
</body>
</html>
